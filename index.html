<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monster Customizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SULOKITO</h1>
    
    <div class="container">
        <div class="monster">
            <div class="antenna"></div>
            <div class="body">
                <div class="eyes">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>

        <div class="controls">
            <h3>Reto para alumnos:</h3>
            <p>Abre style.css y cambia los valores en :root.</p>
            <ul>
                <li>Cambia el color de la piel.</li>
                <li>Haz que los ojos sean gigantes.</li>
                <li>¡Haz que la antena crezca!</li>
            </ul>
            
        </div>
        <p>Ejemplo after/before</p>
        <span>99</span>
    </div>

</body>
</html>
